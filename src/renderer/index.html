<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>MechBox - 机械设计工具箱</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
        />
        <script>
            (function () {
                var settings = {};
                try {
                    settings = JSON.parse(localStorage.getItem("mechbox-enterprise-settings") || "{}");
                } catch (_error) {
                    settings = {};
                }

                var theme = settings.theme === "sand-light" || settings.theme === "graphite-dark"
                    ? settings.theme
                    : "graphite-light";
                var isDark = theme === "graphite-dark";
                var minDuration = Number(settings.startupAnimationDurationMs);
                var showSplash = settings.showStartupAnimation !== false;

                document.documentElement.dataset.themePreset = theme;
                document.documentElement.dataset.themeAppearance = isDark ? "dark" : "light";
                document.documentElement.dataset.uiDensity = settings.compactMode ? "compact" : "comfortable";
                document.documentElement.dataset.motion = settings.reduceMotion ? "reduced" : "normal";
                document.documentElement.dataset.bootSplash = showSplash ? "on" : "off";

                window.__MECHBOX_BOOT__ = {
                    startedAt: Date.now(),
                    minDuration: showSplash ? (Number.isFinite(minDuration) ? Math.max(180, Math.min(2200, minDuration)) : 320) : 0,
                };
            })();
        </script>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
            }

            html {
                background: #eef2f7;
                color-scheme: light;
            }

            html[data-theme-appearance="dark"] {
                background: #0b1220;
                color-scheme: dark;
            }

            body {
                margin: 0;
                overflow: hidden;
                font-family: "Avenir Next", "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
                background:
                    radial-gradient(circle at top left, rgba(47, 91, 206, 0.1) 0, transparent 28%),
                    linear-gradient(180deg, #eef2f7 0%, #eef2f7 100%);
                color: #182230;
            }

            html[data-theme-preset="sand-light"] body {
                background:
                    radial-gradient(circle at top left, rgba(31, 108, 122, 0.12) 0, transparent 28%),
                    linear-gradient(180deg, #f4efe8 0%, #f4efe8 100%);
                color: #2f2722;
            }

            html[data-theme-appearance="dark"] body {
                background:
                    radial-gradient(circle at top left, rgba(119, 160, 255, 0.14) 0, transparent 28%),
                    linear-gradient(180deg, #0b1220 0%, #0b1220 100%);
                color: #e6edf8;
            }

            #app {
                min-height: 100%;
            }

            #boot-splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top right, rgba(47, 91, 206, 0.14) 0, transparent 32%),
                    linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(238, 242, 247, 0.98) 100%);
                opacity: 1;
                transition: opacity 0.32s ease, transform 0.32s ease;
            }

            html[data-theme-preset="sand-light"] #boot-splash {
                background:
                    radial-gradient(circle at top right, rgba(31, 108, 122, 0.14) 0, transparent 32%),
                    linear-gradient(180deg, rgba(255, 253, 249, 0.94) 0%, rgba(244, 239, 232, 0.98) 100%);
            }

            html[data-theme-appearance="dark"] #boot-splash {
                background:
                    radial-gradient(circle at top right, rgba(119, 160, 255, 0.18) 0, transparent 32%),
                    linear-gradient(180deg, rgba(11, 18, 32, 0.94) 0%, rgba(11, 18, 32, 0.99) 100%);
            }

            html[data-boot-splash="off"] #boot-splash {
                display: none;
            }

            #boot-splash.is-hidden {
                opacity: 0;
                transform: scale(1.02);
                pointer-events: none;
            }

            .boot-shell {
                width: min(100%, 420px);
                display: grid;
                gap: 18px;
                justify-items: center;
                text-align: center;
            }

            .boot-mark {
                width: 72px;
                height: 72px;
                border-radius: 22px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #2f5bce 0%, #2347a8 100%);
                color: #fff;
                font-size: 24px;
                font-weight: 800;
                letter-spacing: 0.06em;
                box-shadow: 0 18px 40px rgba(47, 91, 206, 0.24);
                animation: boot-pulse 1.2s ease-in-out infinite;
            }

            html[data-theme-preset="sand-light"] .boot-mark {
                background: linear-gradient(135deg, #1f6c7a 0%, #0e5664 100%);
                box-shadow: 0 18px 40px rgba(31, 108, 122, 0.22);
            }

            html[data-theme-appearance="dark"] .boot-mark {
                background: linear-gradient(135deg, #77a0ff 0%, #4f76d3 100%);
                box-shadow: 0 18px 40px rgba(119, 160, 255, 0.22);
            }

            .boot-copy {
                display: grid;
                gap: 6px;
            }

            .boot-title {
                font-size: 24px;
                font-weight: 800;
                letter-spacing: 0.02em;
            }

            .boot-subtitle {
                color: rgba(24, 34, 48, 0.72);
                font-size: 13px;
                line-height: 1.7;
            }

            html[data-theme-preset="sand-light"] .boot-subtitle {
                color: rgba(47, 39, 34, 0.7);
            }

            html[data-theme-appearance="dark"] .boot-subtitle {
                color: rgba(230, 237, 248, 0.72);
            }

            .boot-loader {
                display: inline-flex;
                gap: 8px;
                align-items: center;
                justify-content: center;
            }

            .boot-loader span {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: rgba(47, 91, 206, 0.8);
                animation: boot-dots 1s ease-in-out infinite;
            }

            .boot-loader span:nth-child(2) {
                animation-delay: 0.12s;
            }

            .boot-loader span:nth-child(3) {
                animation-delay: 0.24s;
            }

            html[data-theme-preset="sand-light"] .boot-loader span {
                background: rgba(31, 108, 122, 0.82);
            }

            html[data-theme-appearance="dark"] .boot-loader span {
                background: rgba(119, 160, 255, 0.86);
            }

            html[data-motion="reduced"] #boot-splash,
            html[data-motion="reduced"] .boot-mark,
            html[data-motion="reduced"] .boot-loader span {
                animation: none !important;
                transition: none !important;
            }

            @keyframes boot-pulse {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-2px);
                }
            }

            @keyframes boot-dots {
                0%,
                80%,
                100% {
                    transform: scale(0.72);
                    opacity: 0.45;
                }
                40% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <div id="boot-splash" aria-hidden="true">
            <div class="boot-shell">
                <div class="boot-mark">MB</div>
                <div class="boot-copy">
                    <div class="boot-title">MechBox</div>
                    <div class="boot-subtitle">正在加载机械设计工具与本地数据库…</div>
                </div>
                <div class="boot-loader">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
